name: Deploy to GitHub Pages

# main への push 内容を gh-pages ブランチへ同期して公開する。
# （Actions トークンでは Pages サイトの新規作成ができないため、
#   gh-pages ブランチ方式で運用する）
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github'
